<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Piya 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-y: auto;
  scroll-behavior: smooth;
}
.section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}
.section.show {
  opacity: 1;
  transform: translateY(0);
}
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 50px rgba(0,0,0,0.6);
  max-width: 420px;
}
h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 46px;
  color: #ff7aa2;
}
.message {
  font-size: 15px;
  margin-top: 15px;
  line-height: 1.7;
  white-space: pre-line;
}
.quote {
  margin-top: 20px;
  font-style: italic;
  opacity: 0.85;
}
button {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg,#ff4d6d,#ff7aa2);
  color: white;
  cursor: pointer;
}
.chatbox {
  margin-top: 15px;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 12px;
  text-align: left;
  font-size: 13px;
}
.msg { padding:8px; margin:5px 0; border-radius:10px; }
.me { background:#ff4d6d; }.star { position: fixed; width: 2px; height: 2px; background: white; animation: twinkle 2s infinite; } @keyframes twinkle { 50% { opacity: 0.2; } }

/* final hidden message */ .hidden { opacity: 0; transition: 1s; } .hidden.show { opacity: 1; } </style>

</head>
<body><!-- SECTION 1 --><div class="section">
  <div class="card">
    <h1>Happy Birthday Piya 🎂</h1>
    <div class="quote">"Some people come into our life and quietly change everything." ❤️</div>
  </div>
</div><!-- SECTION 2 --><div class="section">
  <div class="card">
    <div class="message" id="typing"></div>
  </div>
</div><!-- SECTION 3 --><div class="section">
  <div class="card">
    <div class="quote">"You were there when I needed someone the most… and I’ll always remember that." 💫</div>
    <button onclick="openGift()">🎁 Open Surprise</button>
  </div>
</div><!-- SECTION 4 --><div class="section">
  <div class="card">
    <div class="chatbox" id="chat">
      <div class="msg me">Hey...</div>
    </div>
    <div class="quote">"Not everyone stays… but you did." ❤️</div>
  </div>
</div><!-- FINAL SECRET SECTION --><div class="section">
  <div class="card">
    <div class="quote hidden" id="finalMsg">"No matter what happens… you’ll always have a special place in my heart." ❤️</div>
    <button onclick="revealFinal()">Unlock Final Message 🔐</button>
  </div>
</div><script>
// scroll animation
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll', () => {
 sections.forEach(sec => {
  const top = sec.getBoundingClientRect().top;
  if(top < window.innerHeight - 100){
    sec.classList.add('show');
  }
 });
});

// typing message
const text = `Wishing u many many happy returns of the day stay happy 🍾🎂\n\nI m sorry for the things which are happen in past days.\nThanks for being supportive and understanding utni nhi thi but you were ❤️\n\nAnd hn I m literally sorry for making your birthday worst...\nKasam se maine tujhe gift nhi diya last time bhi aur ab bhi...\nBut you never complaint about that and adjusted the situation 💫\n\nIn fact you gave me the money for my survival... that thing hits me again and again.\n\nBaar baar mt kr call aur pdle msg ❤️💫`;

let i = 0;
function typeEffect(){
 if(i<text.length){
  document.getElementById('typing').innerHTML += text.charAt(i);
  i++;
  setTimeout(typeEffect,25);
 }
}
typeEffect();

// chat simulation
const chats = [
 "I know I messed up...",
 "But you still stayed...",
 "Thank you for everything ❤️",
 "You really matter"
];
let ci=0;
function chatFlow(){
 if(ci<chats.length){
  let div=document.createElement('div');
  div.className='msg me';
  div.innerText=chats[ci];
  document.getElementById('chat').appendChild(div);
  ci++;
  setTimeout(chatFlow,2000);
 }
}
setTimeout(chatFlow,3000);

// stars
for(let i=0;i<120;i++){
 let s=document.createElement('div');
 s.className='star';
 s.style.left=Math.random()*100+'vw';
 s.style.top=Math.random()*100+'vh';
 document.body.appendChild(s);
}

// gift
function openGift(){
 alert('You are really important to me ❤️✨');
}

// final message
function revealFinal(){
 document.getElementById('finalMsg').classList.add('show');
}
</script></body>
</html>
